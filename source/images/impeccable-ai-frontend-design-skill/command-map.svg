    <text x="650" y="525" fill="#6d28d9" font-size="23">/teach-impeccable /clarify /adapt /onboard</text>
    <text x="650" y="565" fill="#6d28d9" font-size="23">브랜드 컨텍스트 + UX 문구 + 디바이스 적응</text>
