<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Node.js 릴리스 일정 변경 커버">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="70" y="90" width="1060" height="450" rx="20" fill="#111827" stroke="#22c55e" stroke-width="2"/>
  <text x="120" y="190" fill="#22c55e" font-size="44" font-family="Pretendard, Noto Sans KR, sans-serif" font-weight="700">Node.js 릴리스 모델 개편</text>
  <text x="120" y="250" fill="#e5e7eb" font-size="32" font-family="Pretendard, Noto Sans KR, sans-serif">연 2회 → 연 1회 / 모든 버전 LTS</text>
  <text x="120" y="315" fill="#cbd5e1" font-size="28" font-family="Pretendard, Noto Sans KR, sans-serif">Node.js 27 (2027)부터 적용</text>

  <g transform="translate(120 380)">
    <rect width="220" height="70" rx="10" fill="#1f2937" stroke="#22c55e"/>
    <text x="18" y="44" fill="#a7f3d0" font-size="26" font-family="Pretendard, Noto Sans KR, sans-serif">Alpha 6개월</text>
  </g>
  <g transform="translate(370 380)">
    <rect width="220" height="70" rx="10" fill="#1f2937" stroke="#38bdf8"/>
    <text x="12" y="44" fill="#bae6fd" font-size="26" font-family="Pretendard, Noto Sans KR, sans-serif">Current 6개월</text>
  </g>
  <g transform="translate(620 380)">
    <rect width="330" height="70" rx="10" fill="#1f2937" stroke="#f59e0b"/>
    <text x="18" y="44" fill="#fde68a" font-size="26" font-family="Pretendard, Noto Sans KR, sans-serif">LTS 30개월</text>
  </g>
</svg>