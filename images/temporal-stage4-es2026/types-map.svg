<svg width="1200" height="760" viewBox="0 0 1200 760" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="760" fill="#f8fafc"/>
  <text x="60" y="74" fill="#0f172a" font-size="40" font-family="Pretendard, Noto Sans KR, sans-serif" font-weight="800">Temporal 타입 선택 가이드</text>
  <g font-family="Pretendard, Noto Sans KR, sans-serif">
    <rect x="60" y="120" width="1080" height="120" rx="12" fill="#dbeafe"/>
    <text x="90" y="168" fill="#1e3a8a" font-size="30" font-weight="700">Temporal.Instant</text>
    <text x="90" y="208" fill="#1e40af" font-size="24">절대 시각(UTC 기반) 저장/전송용. 타임존 정보 없음.</text>

    <rect x="60" y="270" width="1080" height="120" rx="12" fill="#dcfce7"/>
    <text x="90" y="318" fill="#14532d" font-size="30" font-weight="700">Temporal.ZonedDateTime</text>
    <text x="90" y="358" fill="#166534" font-size="24">타임존+캘린더 포함. DST 경계 계산이 필요한 실무 기본값.</text>

    <rect x="60" y="420" width="1080" height="120" rx="12" fill="#fef3c7"/>
    <text x="90" y="468" fill="#78350f" font-size="30" font-weight="700">Temporal.PlainDate / PlainTime / PlainDateTime</text>
    <text x="90" y="508" fill="#92400e" font-size="24">벽시계 시간(wall time) 표현용. 타임존 계산이 목적이 아닐 때 선택.</text>

    <rect x="60" y="570" width="1080" height="120" rx="12" fill="#e2e8f0"/>
    <text x="90" y="618" fill="#1e293b" font-size="30" font-weight="700">Temporal.Duration</text>
    <text x="90" y="658" fill="#334155" font-size="24">두 시점 차이 또는 가감 연산 표현. 단위별 합/변환(total) 지원.</text>
  </g>
</svg>